<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 1. O Nome do Aplicativo (aparece na aba do navegador) -->
    <title>BotIzabel Promocoes</title>

    <!-- 2. O Ícone para Android/Chrome (o que aparece na tela inicial) -->
    <link rel="icon" type="image/png" href="https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?auto=format&fit=crop&q=80&w=192&h=192" />

    <!-- 3. O Ícone específico para iPhone/iPad (iOS) -->
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?auto=format&fit=crop&q=80&w=180&h=180" />

    <!-- 4. Nome curto para o atalho na tela inicial do iPhone -->
    <meta name="apple-mobile-web-app-title" content="BotIzabel Promocoes" />

    <!-- 5. Nome oficial para o sistema do Android reconhecer como App -->
    <meta name="application-name" content="BotIzabel Promocoes" />

    <!-- 6. Cor do "Tema" (é a cor que pinta a barra de cima do navegador e as bordas) -->
    <meta name="theme-color" content="#d81b60" />

    <!-- 7. Modo de exibição (opcional em alguns navegadores, mas ajuda) -->
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fdf2f8;
            color: #000;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #f472b6;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
